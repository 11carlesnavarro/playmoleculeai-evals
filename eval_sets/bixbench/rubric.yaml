# Default rubric for the bixbench eval set. Cases are graded by
# python_check verifiers (str / range / llm), so the rubric is unused
# in normal operation. Kept for harness compatibility (eval_set.yaml
# requires rubric_path) and as a placeholder for future opt-in cases.
dimensions:
  - name: correctness
    question: |
      Does the answer correctly resolve the research question against
      the capsule's data?
    scale: [1, 5]
pass_threshold: 3.5
