cases:

  - id: mv-5483
    difficulty: medium
    prompt: |
      Show VRK2 (2V62) aligned to VRK1 (3OP5), and highlight in
      ball-and-stick (blue) the residues that differ between them.
    tags: [align, compare, highlight]
    timeout_s: 480
    preload:
      viewer:
        pdb_ids: ["3OP5", "2V62"]
    assertions:
      - type: python_check
        function: mv5483_alignment
      - type: python_check
        function: mv5483_diff_residues_highlighted
    rubric:
      enabled: false
