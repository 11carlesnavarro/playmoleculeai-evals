cases:

  - id: mv-0254
    difficulty: hard
    prompt: |
      Load 5TBY, 5N69, and 8EFH. Drop every chain that is not part of
      the myosin (e.g. actin or other non-myosin partners). For any
      structure that contains a myosin homo-dimer, also keep only one
      of the two heavy chains plus its associated light chains, so each
      PDB ends up showing a single myosin motor. Then structurally
      align the three motors and color each structure with a distinct
      solid color so the three are visually distinguishable.
    tags: [multi-structure, align, filter, color]
    timeout_s: 600
    assertions:
      - type: python_check
        function: mv0254_myosin_aligned
    rubric:
      enabled: false

  - id: mv-5483
    difficulty: medium
    prompt: |
      Show chain A of VRK2 (2V62) aligned to chain A of VRK1 (3OP5),
      and highlight in blue (#0000FF) ball-and-stick the chain-A
      residues that differ between them.
    tags: [align, compare, highlight]
    timeout_s: 480
    preload:
      viewer:
        pdb_ids: ["3OP5", "2V62"]
    assertions:
      - type: python_check
        function: mv5483_alignment
      - type: python_check
        function: mv5483_diff_residues_highlighted
    rubric:
      enabled: false

  - id: mv-3830
    difficulty: medium
    prompt: |
      Display the 1IEP complex and the docked poses from outlig0.sdf
      in the viewer. Report the lowest RMSD of the docked poses
      relative to the experimental ligand from the 1IEP crystal,
      in Ångströms, between <answer>...</answer> tags,
      e.g. <answer>1.40</answer>.
    tags: [docking, rmsd]
    timeout_s: 480
    preload:
      project:
        files: ["outlig0.sdf"]
    assertions:
      - type: python_check
        function: mv3830_rmsd_correct
    rubric:
      enabled: false

  - id: mv-5499
    difficulty: medium
    prompt: |
      Load 8AYF, mutate Val161 to Cys on both chains (A:V161C, B:V161C),
      show the mutated cysteines as ball-and-stick in the viewer, then
      measure the distance between the sulfur atoms (SG of A:CYS161 and
      SG of B:CYS161). Report the result in Ångströms between
      <answer>...</answer> tags, e.g. <answer>8.39</answer>.
    tags: [mutate, measure]
    timeout_s: 480
    assertions:
      - type: python_check
        function: mv5499_distance_correct
    rubric:
      enabled: false

  - id: mv-8144
    difficulty: medium
    prompt: |
      Load the METTL3-METTL14 complex (5IL1) and highlight using a
      viewer selection the interface residues on both chains (residues
      with any heavy atom within 5 Å of the partner chain).
    tags: [interface, highlight]
    timeout_s: 360
    assertions:
      - type: python_check
        function: mv8144_interface_highlighted
    rubric:
      enabled: false

  - id: mv-2ity
    difficulty: medium
    prompt: |
      Load EGFR kinase domain (2ITY). Color the N-lobe (residues 712-770)
      blue (#0000FF) and the C-lobe (residues 771-979) yellow (#FFFF00) as
      cartoon. Highlight the catalytic K745, E762, and D855 as ball-and-stick
      in red (#FF0000).
    tags: [domains, color, catalytic-triad]
    timeout_s: 360
    assertions:
      - type: python_check
        function: mv2ity_kinase_domains
    rubric:
      enabled: false

  - id: mv-6568
    difficulty: medium
    prompt: |
      Load membrane.pdb. Color the phosphatidylcholine lipids blue
      (#0000FF) and the cholesterol molecules yellow (#FFFF00) as
      ball-and-stick. Then count the residues of each kind in the
      loaded membrane and report the molar ratio of phosphatidylcholine
      to cholesterol between <answer>...</answer> tags as a decimal,
      e.g. <answer>2.50</answer>.
    tags: [membrane, lipids, color, count, ratio]
    timeout_s: 480
    preload:
      project:
        files: ["membrane.pdb"]
    assertions:
      - type: python_check
        function: mv6568_membrane_composition
    rubric:
      enabled: false

  - id: mv-1jpz
    difficulty: medium
    prompt: |
      Mark the Fe atom of HEM (chain A), the C18 atom of ligand 140
      (chain A), and the pseudo-oxo point (the atom in pseudo_oxo.pdb)
      using a viewer selection.
    tags: [atom-highlight, p450, selection]
    timeout_s: 360
    preload:
      viewer:
        pdb_ids: ["1JPZ"]
        files: ["pseudo_oxo.pdb"]
    assertions:
      - type: python_check
        function: mv1jpz_atoms_highlighted
    rubric:
      enabled: false

  - id: mv-7fab
    difficulty: medium
    prompt: |
      Load the Fab structure 7FAB. Highlight the cysteine residues
      involved in disulfide bonds using a viewer selection.
    tags: [disulfide, antibody, selection]
    timeout_s: 360
    assertions:
      - type: python_check
        function: mv7fab_disulfides
    rubric:
      enabled: false

  - id: mv-6316
    difficulty: easy
    prompt: |
      Load 6FCX and highlight the active site (the protein residues
      at 6 Å of the ligand SAH) in blue (#0000FF) ball-and-stick.
    tags: [load, active-site, highlight]
    timeout_s: 360
    assertions:
      - type: python_check
        function: mv6316_active_site_highlighted
    rubric:
      enabled: false
